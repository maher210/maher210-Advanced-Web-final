{% extends "base.html" %}

{% block content %}
<h2>Add Review</h2>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label>Rating (1–5)</label>
        <input type="number" name="rating" class="form-control" min="1" max="5">
    </div>

    <div class="mb-3">
        <label>Comment</label>
        <textarea name="comment" class="form-control"></textarea>
    </div>

    <button class="btn btn-primary">Submit</button>
</form>
{% endblock %}
